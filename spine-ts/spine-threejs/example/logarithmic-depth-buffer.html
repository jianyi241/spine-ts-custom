<html>
  <head>
    <meta charset="UTF-8" />
    <title>spine-threejs（对数深度缓冲）</title>
    <script src="https://unpkg.com/three@0.141.0/build/three.js"></script>
    <script src="../dist/iife/spine-threejs.js"></script>
    <script src="./OrbitalControls.js"></script>
  </head>
  <style>
    * {
      margin: 0;
      padding: 0;
    }

    body,
    html {
      height: 100%;
      background: #1a1a2e;
    }

    canvas {
      position: absolute;
      width: 100%;
      height: 100%;
    }
  </style>

  <body>
    <script>
      (function () {
        let scene, camera, renderer;
        let geometry, material, mesh, skeletonMesh;
        let assetManager;
        let canvas;
        let controls;
        let lastFrameTime = Date.now() / 1000;
        let elapsedTime = 0;

        let baseUrl = "assets/bengtie/";
        let skeletonFile = "kv_42_web_a.json";
        let atlasFile = skeletonFile
          .replace("-pro", "")
          .replace("-ess", "")
          .replace(".json", ".atlas");
        /** 首选动画名；若 JSON 中不存在则自动回退 */
        let animation = "animation";

        function pickAnimationName(skeletonData, preferred) {
          if (skeletonData.findAnimation(preferred)) return preferred;
          for (var i = 0; i < skeletonData.animations.length; i++) {
            var n = skeletonData.animations[i].name;
            if (n === "walk" || n === "animation") return n;
          }
          return skeletonData.animations.length
            ? skeletonData.animations[0].name
            : null;
        }

        /** 与默认 SkeletonMeshMaterial 一致使用 diffuse；并接入 log depth（与 index 的 depthTest 行为对齐） */
        function applyLogDepthSpineMaterial(materialParameters) {
          materialParameters.depthTest = false;
          materialParameters.depthWrite = false;
          materialParameters.vertexShader = `
                attribute vec4 color;
                varying vec2 vUv;
                varying vec4 vColor;

                #include <common>
                #include <logdepthbuf_pars_vertex>

                void main() {
                  vUv = uv;
                  vColor = color;
                  gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                  #include <logdepthbuf_vertex>
                }
                `;

          materialParameters.fragmentShader = `
                uniform sampler2D diffuse;
                #ifdef USE_SPINE_ALPHATEST
                uniform float alphaTest;
                #endif
                varying vec2 vUv;
                varying vec4 vColor;

                #include <common>
                #include <logdepthbuf_pars_fragment>

                void main(void) {
                  #include <logdepthbuf_fragment>

                  gl_FragColor = texture2D(diffuse, vUv) * vColor;
                  #ifdef USE_SPINE_ALPHATEST
                  if (gl_FragColor.a < alphaTest) discard;
                  #endif
                }
                `;
        }

        function init() {
          let width = window.innerWidth,
            height = window.innerHeight;
          camera = new THREE.PerspectiveCamera(75, width / height, 1, 3000);
          camera.position.y = 0;
          camera.position.z = 600;
          scene = new THREE.Scene();
          renderer = new THREE.WebGLRenderer({
            antialias: true,
            alpha: true,
            logarithmicDepthBuffer: true,
          });
          renderer.setSize(width, height);
          renderer.setClearColor(0x1a1a2e, 1);
          document.body.appendChild(renderer.domElement);
          canvas = renderer.domElement;
          controls = new OrbitControls(camera, renderer.domElement);

          assetManager = new spine.AssetManager(baseUrl);
          assetManager.loadText(skeletonFile);
          assetManager.loadTextureAtlas(atlasFile);

          requestAnimationFrame(load);
        }

        function load() {
          if (assetManager.isLoadingComplete()) {
            geometry = new THREE.BoxGeometry(1, 1, 1);
            material = new THREE.MeshBasicMaterial({ visible: false });
            mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            var atlas = assetManager.require(atlasFile);
            var atlasLoader = new spine.AtlasAttachmentLoader(atlas);
            var skeletonJson = new spine.SkeletonJson(atlasLoader);
            skeletonJson.scale = 0.35;

            var rawText = assetManager.require(skeletonFile);
            var rawJson = JSON.parse(rawText);
            var skeletonData = skeletonJson.readSkeletonData(rawText);

            var exportVer = skeletonData.version || "";
            if (exportVer && exportVer.indexOf("4.2") !== 0) {
              console.warn(
                "[Spine] 骨骼 JSON 的 skeleton.spine 为 " +
                  exportVer +
                  "，与当前 4.2 运行时不匹配。请用 Spine Editor 4.2.x 重新导出。"
              );
            }

            skeletonData.extra = rawJson.extra || {};
            skeletonData.extraSlot = rawJson.extraSlot || {};
            skeletonData.extraConfig = rawJson.extraConfig || { timeScale: 1 };

            var animName = pickAnimationName(skeletonData, animation);
            if (!animName) {
              console.error("JSON 中没有任何动画:", skeletonFile);
              return;
            }
            if (animName !== animation) {
              console.warn(
                '[logarithmic-depth-buffer] 未找到动画 "' +
                  animation +
                  '"，已改用 "' +
                  animName +
                  '"'
              );
            }

            // 对数深度：自定义 shader 必须与 MeshBatcher 使用的 diffuse 一致，否则会丢贴图
            // https://discourse.threejs.org/t/shadermaterial-render-order-with-logarithmicdepthbuffer-is-wrong/49221/3
            skeletonMesh = new spine.SkeletonMesh(
              skeletonData,
              applyLogDepthSpineMaterial
            );
            skeletonMesh.state.setAnimation(0, animName, true);
            mesh.add(skeletonMesh);

            requestAnimationFrame(render);
          } else requestAnimationFrame(load);
        }

        function render() {
          let now = Date.now() / 1000;
          let delta = now - lastFrameTime;
          lastFrameTime = now;
          elapsedTime += delta;

          resize();
          controls.update();

          // 与 index.html 相同：第二参数为累计时间，驱动 extra 里 GSAP / 弹簧等扩展动效
          skeletonMesh.update(delta, elapsedTime);

          renderer.render(scene, camera);
          requestAnimationFrame(render);
        }

        function resize() {
          let w = window.innerWidth;
          let h = window.innerHeight;
          if (canvas.width != w || canvas.height != h) {
            canvas.width = w;
            canvas.height = h;
          }

          camera.aspect = w / h;
          camera.updateProjectionMatrix();

          renderer.setSize(w, h);
        }

        init();
      })();
    </script>
  </body>
</html>
